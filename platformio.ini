; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32-s3-devkitc-1

; --- CONFIGURATION FOR THE MAIN ROBOT (IR/GPS) ---
[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.5
    mikalhart/TinyGPSPlus @ ^1.0.3
    witnessmenow/UniversalTelegramBot @ ^1.3.0
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    adafruit/Adafruit MLX90614 Library @ ^2.1.5
; Uses wildcards to safely navigate the spaces and include your IR and GPS source files
build_src_filter = +<main.cpp> +<sensor*configuration/ir*sensors/*.cpp> +<sensor*configuration/gps*sensors/*.cpp>

; --- CONFIGURATION FOR STANDARD ESP32 (TESTING) ---
[env:esp32dev_testing]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.5
    mikalhart/TinyGPSPlus @ ^1.0.3
    witnessmenow/UniversalTelegramBot @ ^1.3.0
    adafruit/Adafruit MLX90614 Library @ ^2.1.5
build_src_filter = +<main.cpp> +<sensor*configuration/ir*sensors/*.cpp> +<sensor*configuration/gps*sensors/*.cpp>

; --- CONFIGURATION FOR THE ESP32-CAM (LEFT) ---
[env:camera_left]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
build_flags =
    -I ../Cam_certs/
    -DCAMERA_POSITION=\"LEFT\"
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.5
    witnessmenow/UniversalTelegramBot @ ^1.3.0
build_src_filter = +<sensor*configuration/camera_system/camera_sensor.cpp>

; --- CONFIGURATION FOR THE ESP32-CAM (CENTER) ---
[env:camera_center]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
build_flags =
    -I ../Cam_certs/
    -DCAMERA_POSITION=\"CENTER\"
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.5
    witnessmenow/UniversalTelegramBot @ ^1.3.0
build_src_filter = +<sensor*configuration/camera_system/camera_sensor.cpp>

; --- CONFIGURATION FOR THE ESP32-CAM (RIGHT) ---
[env:camera_right]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
build_flags =
    -I ../Cam_certs/
    -DCAMERA_POSITION=\"RIGHT\" 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.5
    witnessmenow/UniversalTelegramBot @ ^1.3.0
build_src_filter = +<sensor*configuration/camera_system/camera_sensor.cpp>