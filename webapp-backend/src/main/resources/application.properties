spring.application.name=webapp-backend

# ===== DynamoDB configuration =====
app.dynamodb.region=ap-southeast-1
app.dynamodb.table-name=ir_sensor_data

# ===== AWS IoT Core MQTT subscriber configuration =====
# Example broker URI: ssl://xxxxxxxxxxxxx-ats.iot.ap-southeast-1.amazonaws.com:8883
app.mqtt.enabled=false
app.mqtt.broker-uri=
app.mqtt.client-id=webapp-backend-ir-subscriber
app.mqtt.topic=railsafe/ir-sensor/data

# Paths to X.509 certificate files used by AWS IoT Core mutual TLS
app.mqtt.ca-cert-path=
app.mqtt.client-cert-path=
app.mqtt.private-key-path=
